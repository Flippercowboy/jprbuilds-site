<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Log — jprbuilds</title>
<link rel="stylesheet" href="/css/site.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  .page-header {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem 0.5rem;
  }

  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 130px);
  }

  .sidebar {
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 130px);
    position: sticky;
    top: 0;
  }

  .stats-bar {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5rem;
  }
  .stat-item { text-align: center; }
  .stat-item .val { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: #a78bfa; display: block; line-height: 1.2; }
  .stat-item .lbl { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em; }

  .activities-header { padding: 0.75rem 1.5rem 0.4rem; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.2); }
  .activities-list { overflow-y: auto; flex: 1; }

  .activity-item {
    padding: 0.875rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.15s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 2px;
    align-items: start;
    border-left: 2px solid transparent;
  }
  .activity-item:hover { background: rgba(255,255,255,0.03); }
  .activity-item.active { background: rgba(167,139,250,0.08); border-left-color: #a78bfa; }
  .activity-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .activity-meta { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }
  .activity-dist { font-family: 'DM Serif Display', serif; font-size: 1rem; color: #a78bfa; text-align: right; }
  .activity-pace { font-size: 11px; color: rgba(255,255,255,0.3); text-align: right; }
  .hr-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 1px 5px; border-radius: 20px; margin-top: 3px; }
  .hr-pill .dot { width: 5px; height: 5px; border-radius: 50%; }

  .main { display: flex; flex-direction: column; overflow-y: auto; }

  .map-container { position: relative; height: 380px; background: rgba(255,255,255,0.02); flex-shrink: 0; }
  #map { width: 100%; height: 100%; }

  .map-overlay {
    position: absolute; top: 12px; left: 12px; z-index: 999;
    background: rgba(26,24,51,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 10px 14px; backdrop-filter: blur(8px);
  }
  .map-overlay .activity-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: rgba(255,255,255,0.9); }
  .map-overlay .activity-subtitle { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }

  .hr-legend {
    position: absolute; bottom: 12px; right: 12px; z-index: 999;
    background: rgba(26,24,51,0.92); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; backdrop-filter: blur(8px);
  }
  .hr-legend-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.25); margin-bottom: 2px; }
  .hr-legend-row { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(255,255,255,0.45); }
  .hr-legend-swatch { width: 18px; height: 3px; border-radius: 2px; }

  .detail-area { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .top-stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.6rem; }
  .top-stat {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 0.75rem 0.875rem; transition: border-color 0.2s;
  }
  .top-stat:hover { border-color: rgba(167,139,250,0.35); }
  .top-stat .ts-val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: #a78bfa; line-height: 1.1; }
  .top-stat .ts-lbl { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

  .detail-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .detail-col { display: flex; flex-direction: column; gap: 1.25rem; }

  .section-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 1rem 1.125rem; transition: border-color 0.2s;
  }
  .section-card:hover { border-color: rgba(167,139,250,0.3); }
  .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-bottom: 0.75rem; }

  .splits-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .splits-table th { text-align: left; font-weight: 500; color: rgba(255,255,255,0.25); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 0 6px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .splits-table th:not(:first-child) { text-align: right; }
  .splits-table td { padding: 5px 0; color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  .splits-table td:not(:first-child) { text-align: right; }
  .splits-table td:first-child { color: rgba(255,255,255,0.4); font-size: 11px; }
  .splits-table .pace-val { color: rgba(255,255,255,0.85); font-weight: 500; }
  .pace-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .pace-bar { height: 3px; border-radius: 2px; background: #a78bfa; opacity: 0.6; min-width: 4px; }

  .efforts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .effort-item { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; }
  .effort-name { font-size: 11px; color: rgba(255,255,255,0.45); }
  .effort-time { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.8); }

  .segment-item { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .segment-item:last-child { border-bottom: none; }
  .segment-name { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .segment-pr { font-size: 10px; padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
  .pr-1 { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
  .pr-2 { background: rgba(192,192,192,0.15); color: #c0c0c0; border: 1px solid rgba(192,192,192,0.3); }
  .pr-3 { background: rgba(205,127,50,0.15); color: #cd7f32; border: 1px solid rgba(205,127,50,0.3); }
  .pr-none { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08); }

  .chart-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 1rem 1.125rem; transition: border-color 0.2s; }
  .chart-card:hover { border-color: rgba(167,139,250,0.3); }
  .chart-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.3); margin-bottom: 10px; }

  .meta-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .meta-chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 10px; }

  .loading { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 200px; color: rgba(255,255,255,0.3); font-size: 13px; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .strava-badge { display: flex; align-items: center; gap: 6px; font-size: 0.875rem; color: rgba(255,255,255,0.25); }
  .strava-badge span { width: 8px; height: 8px; border-radius: 50%; background: #fc4c02; display: inline-block; }

  .leaflet-container { background: #1a1833 !important; }
  .leaflet-tile { filter: brightness(0.55) saturate(0.3) hue-rotate(200deg); }

  @media (max-width: 1000px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 300px; position: static; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .top-stats { grid-template-columns: repeat(3, 1fr); }
    .detail-cols { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .top-stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="/" class="back-link">← jprbuilds.com</a>
  <a href="/"><img src="/Logos/jprbuilds-logo-navbar.svg" alt="JPRBuilds" height="50" /></a>
</nav>

<div class="page-header">
  <h1>Running <em class="accent">Log</em></h1>
  <div class="strava-badge"><span></span> via Strava</div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="stats-bar">
      <div class="stat-item"><span class="val" id="totalRuns">—</span><span class="lbl">Runs this month</span></div>
      <div class="stat-item"><span class="val" id="totalDist">—</span><span class="lbl">km this month</span></div>
      <div class="stat-item"><span class="val" id="avgPace">—</span><span class="lbl">Avg pace</span></div>
    </div>
    <div class="activities-header">Recent runs</div>
    <div class="activities-list" id="activitiesList">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>
  </aside>

  <main class="main">
    <div class="map-container">
      <div id="map"></div>
      <div class="map-overlay" id="mapOverlay" style="display:none">
        <div class="activity-title" id="overlayTitle"></div>
        <div class="activity-subtitle" id="overlaySubtitle"></div>
      </div>
      <div class="hr-legend">
        <div class="hr-legend-title">Heart rate</div>
        <div class="hr-legend-row"><div class="hr-legend-swatch" style="background:#4fc3f7"></div> Easy &lt;120</div>
        <div class="hr-legend-row"><div class="hr-legend-swatch" style="background:#aed581"></div> Steady 120–140</div>
        <div class="hr-legend-row"><div class="hr-legend-swatch" style="background:#ffeb3b"></div> Tempo 140–155</div>
        <div class="hr-legend-row"><div class="hr-legend-swatch" style="background:#ff8c42"></div> Hard 155–168</div>
        <div class="hr-legend-row"><div class="hr-legend-swatch" style="background:#e53935"></div> Max &gt;168</div>
      </div>
    </div>
    <div class="detail-area" id="detailArea">
      <div class="loading">Select a run to see details</div>
    </div>
  </main>
</div>

<footer class="site-footer">
  Jason Richards © 2026 &nbsp;·&nbsp; Daventry, UK
</footer>

<script>
const PROXY = '/strava/proxy.php';
let map = null, routeLayer = null, hrChart = null, altChart = null;

function hrColor(bpm) {
  if (bpm < 120) return '#4fc3f7';
  if (bpm < 140) return '#aed581';
  if (bpm < 155) return '#ffeb3b';
  if (bpm < 168) return '#ff8c42';
  return '#e53935';
}
function fDist(m) { return (m/1000).toFixed(2) + ' km'; }
function fPace(mps) {
  if (!mps) return '—';
  const spm = 1000/mps, m = Math.floor(spm/60), s = Math.round(spm%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function fTime(s) {
  const m = Math.floor(s/60), sec = (s%60).toString().padStart(2,'0');
  return m > 59 ? `${Math.floor(m/60)}h ${(m%60).toString().padStart(2,'0')}m` : `${m}:${sec}`;
}
function fDate(iso) { return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fShortTime(s) {
  if (s < 60) return s + 's';
  const m = Math.floor(s/60), sec = (s%60).toString().padStart(2,'0');
  return m > 59 ? `${Math.floor(m/60)}:${(m%60).toString().padStart(2,'0')}:${sec}` : `${m}:${sec}`;
}
function hrZone(avg) {
  if (!avg) return null;
  if (avg < 120) return { label:'Easy', color:'#4fc3f7' };
  if (avg < 140) return { label:'Steady', color:'#aed581' };
  if (avg < 155) return { label:'Tempo', color:'#ffeb3b' };
  if (avg < 168) return { label:'Hard', color:'#ff8c42' };
  return { label:'Max effort', color:'#e53935' };
}

async function loadActivities() {
  try {
    const res = await fetch(`${PROXY}?action=activities`);
    const runs = await res.json();

    const now = new Date(), monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthRuns = runs.filter(a => new Date(a.start_date) >= monthStart);
    const monthDist = monthRuns.reduce((s,a) => s + a.distance, 0);
    const speeds = runs.filter(a => a.average_speed);
    const avgSpd = speeds.reduce((s,a) => s + a.average_speed, 0) / speeds.length;

    document.getElementById('totalRuns').textContent = monthRuns.length;
    document.getElementById('totalDist').textContent = (monthDist/1000).toFixed(1);
    document.getElementById('avgPace').textContent = fPace(avgSpd);

    const list = document.getElementById('activitiesList');
    list.innerHTML = '';
    runs.forEach((a, i) => {
      const zone = hrZone(a.average_heartrate);
      const div = document.createElement('div');
      div.className = 'activity-item' + (i === 0 ? ' active' : '');
      div.innerHTML = `
        <div>
          <div class="activity-name">${a.name}</div>
          <div class="activity-meta">${fDate(a.start_date_local)}</div>
          ${zone && a.average_heartrate ? `<div class="hr-pill" style="background:${zone.color}22;color:${zone.color}"><span class="dot" style="background:${zone.color}"></span>${Math.round(a.average_heartrate)} bpm</div>` : ''}
        </div>
        <div>
          <div class="activity-dist">${fDist(a.distance)}</div>
          <div class="activity-pace">${fPace(a.average_speed)} /km</div>
        </div>`;
      div.addEventListener('click', () => selectActivity(a.id, div));
      list.appendChild(div);
    });

    if (runs.length > 0) selectActivity(runs[0].id, list.querySelector('.activity-item'));
  } catch(e) {
    document.getElementById('activitiesList').innerHTML = '<div class="loading">Failed to load</div>';
  }
}

async function selectActivity(id, el) {
  document.querySelectorAll('.activity-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('detailArea').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';

  const [actRes, streamRes] = await Promise.all([
    fetch(`${PROXY}?action=activity&id=${id}`),
    fetch(`${PROXY}?action=streams&id=${id}`)
  ]);
  const activity = await actRes.json();
  const streams = await streamRes.json();

  document.getElementById('mapOverlay').style.display = 'block';
  document.getElementById('overlayTitle').textContent = activity.name;
  document.getElementById('overlaySubtitle').textContent = `${fDate(activity.start_date_local)} · ${fDist(activity.distance)}`;

  drawRoute(streams);
  renderDetail(activity, streams);
}

function drawRoute(streams) {
  if (!map) {
    map = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }
  if (routeLayer) map.removeLayer(routeLayer);
  const latlng = streams.latlng?.data, hr = streams.heartrate?.data;
  if (!latlng || !latlng.length) return;
  const segments = [];
  for (let i = 0; i < latlng.length - 1; i++) {
    segments.push(L.polyline([latlng[i], latlng[i+1]], { color: hr ? hrColor(hr[i]) : '#a78bfa', weight: 4, opacity: 0.9 }));
  }
  routeLayer = L.layerGroup(segments).addTo(map);
  map.fitBounds(L.latLngBounds(latlng), { padding: [30, 30] });
}

function renderDetail(a, streams) {
  if (hrChart) { hrChart.destroy(); hrChart = null; }
  if (altChart) { altChart.destroy(); altChart = null; }

  const hr = streams.heartrate?.data;
  const alt = streams.altitude?.data;
  const dist = streams.distance?.data;
  const distKm = dist ? dist.map(d => (d/1000).toFixed(2)) : [];

  // Top stats
  const topStats = `<div class="top-stats">
    <div class="top-stat"><div class="ts-val">${fDist(a.distance)}</div><div class="ts-lbl">Distance</div></div>
    <div class="top-stat"><div class="ts-val">${fTime(a.moving_time)}</div><div class="ts-lbl">Moving time</div></div>
    <div class="top-stat"><div class="ts-val">${fPace(a.average_speed)}</div><div class="ts-lbl">Avg pace</div></div>
    <div class="top-stat"><div class="ts-val">${a.average_heartrate ? Math.round(a.average_heartrate) + ' bpm' : '—'}</div><div class="ts-lbl">Avg HR</div></div>
    <div class="top-stat"><div class="ts-val">${a.max_heartrate ? a.max_heartrate + ' bpm' : '—'}</div><div class="ts-lbl">Max HR</div></div>
    <div class="top-stat"><div class="ts-val">${a.total_elevation_gain ? Math.round(a.total_elevation_gain) + 'm' : '—'}</div><div class="ts-lbl">Elevation</div></div>
    <div class="top-stat"><div class="ts-val">${a.average_cadence ? Math.round(a.average_cadence * 2) + ' spm' : '—'}</div><div class="ts-lbl">Cadence</div></div>
    <div class="top-stat"><div class="ts-val">${a.calories || '—'}</div><div class="ts-lbl">Calories</div></div>
    <div class="top-stat"><div class="ts-val">${a.suffer_score || '—'}</div><div class="ts-lbl">Suffer score</div></div>
    <div class="top-stat"><div class="ts-val">${fPace(a.max_speed)}</div><div class="ts-lbl">Best pace</div></div>
    <div class="top-stat"><div class="ts-val">${a.achievement_count || 0}</div><div class="ts-lbl">Achievements</div></div>
    <div class="top-stat"><div class="ts-val">${a.pr_count || 0}</div><div class="ts-lbl">PRs</div></div>
  </div>`;

  // Meta chips
  const metaRow = `<div class="meta-row">
    ${a.gear ? `<div class="meta-chip">👟 ${a.gear.name} · ${(a.gear.distance/1000).toFixed(0)}km total</div>` : ''}
    <div class="meta-chip">📅 ${fDate(a.start_date_local)}</div>
    ${a.device_name ? `<div class="meta-chip">📱 ${a.device_name}</div>` : ''}
  </div>`;

  // Splits
  const splits = (a.splits_metric || []).filter(s => s.distance > 100);
  const paces = splits.map(s => s.average_speed > 0 ? 1000/s.average_speed : 999);
  const minP = Math.min(...paces), maxP = Math.max(...paces);
  const splitsRows = splits.map(s => {
    const paceVal = s.average_speed > 0 ? 1000/s.average_speed : 999;
    const barW = Math.round(40 * (maxP - paceVal) / (maxP - minP + 0.01) + 8);
    const elev = s.elevation_difference;
    const elevStr = elev >= 0 ? `+${Math.round(elev)}m` : `${Math.round(elev)}m`;
    const elevColor = elev > 2 ? 'rgba(255,100,100,0.7)' : elev < -2 ? 'rgba(100,200,100,0.7)' : 'rgba(255,255,255,0.3)';
    return `<tr>
      <td>km ${s.split}</td>
      <td><div class="pace-bar-wrap"><div class="pace-bar" style="width:${barW}px"></div><span class="pace-val">${fPace(s.average_speed)}</span></div></td>
      <td style="color:${elevColor}">${elevStr}</td>
      <td>${s.average_heartrate ? Math.round(s.average_heartrate) : '—'}</td>
    </tr>`;
  }).join('');

  const splitsCard = `<div class="section-card">
    <div class="section-title">Km splits</div>
    <table class="splits-table">
      <thead><tr><th>Split</th><th style="text-align:right">Pace</th><th style="text-align:right">Elev</th><th style="text-align:right">HR</th></tr></thead>
      <tbody>${splitsRows}</tbody>
    </table>
  </div>`;

  // Best efforts
  const efforts = (a.best_efforts || []).filter(e => ['400m','1K','1 mile','2 mile','5K','10K'].includes(e.name));
  const effortsCard = `<div class="section-card">
    <div class="section-title">Best efforts</div>
    <div class="efforts-grid">${efforts.length ? efforts.map(e => `
      <div class="effort-item">
        <span class="effort-name">${e.name}</span>
        <span class="effort-time">${fShortTime(e.elapsed_time)}</span>
      </div>`).join('') : '<div style="font-size:12px;color:rgba(255,255,255,0.2)">None recorded</div>'}
    </div>
  </div>`;

  // Segments
  const segs = (a.segment_efforts || []).slice(0, 6);
  const segsCard = `<div class="section-card">
    <div class="section-title">Segments</div>
    ${segs.length ? segs.map(s => {
      const pr = s.pr_rank;
      const prLabel = pr === 1 ? '🥇 PR' : pr === 2 ? '🥈 2nd' : pr === 3 ? '🥉 3rd' : fShortTime(s.elapsed_time);
      const prClass = pr === 1 ? 'pr-1' : pr === 2 ? 'pr-2' : pr === 3 ? 'pr-3' : 'pr-none';
      return `<div class="segment-item"><span class="segment-name">${s.name}</span><span class="segment-pr ${prClass}">${prLabel}</span></div>`;
    }).join('') : '<div style="font-size:12px;color:rgba(255,255,255,0.2)">No segments</div>'}
  </div>`;

  // Charts
  const hrCard = hr ? `<div class="chart-card"><div class="chart-label">Heart rate (bpm)</div><div style="position:relative;height:130px"><canvas id="hrCanvas"></canvas></div></div>` : '';
  const altCard = alt ? `<div class="chart-card"><div class="chart-label">Elevation (m)</div><div style="position:relative;height:100px"><canvas id="altCanvas"></canvas></div></div>` : '';

  document.getElementById('detailArea').innerHTML = `
    ${topStats}${metaRow}
    <div class="detail-cols">
      <div class="detail-col">${splitsCard}${effortsCard}</div>
      <div class="detail-col">${segsCard}${hrCard}${altCard}</div>
    </div>`;

  const tick = { color: 'rgba(255,255,255,0.3)', font: { size: 10, family: 'DM Sans' } };
  const grid = { color: 'rgba(255,255,255,0.05)' };
  const skip = { autoSkip: true, maxTicksLimit: 6 };

  if (hr) hrChart = new Chart(document.getElementById('hrCanvas'), {
    type: 'line',
    data: { labels: distKm, datasets: [{ data: hr, borderColor: '#ff8c42', backgroundColor: 'rgba(255,140,66,0.1)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => Math.round(c.parsed.y) + ' bpm' } } }, scales: { x: { ticks: { ...tick, ...skip }, grid }, y: { min: 50, ticks: { ...tick, callback: v => v + ' bpm' }, grid } } }
  });

  if (alt) altChart = new Chart(document.getElementById('altCanvas'), {
    type: 'line',
    data: { labels: distKm, datasets: [{ data: alt, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.08)', borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => Math.round(c.parsed.y) + 'm' } } }, scales: { x: { ticks: { ...tick, ...skip }, grid }, y: { ticks: { ...tick, callback: v => v + 'm' }, grid } } }
  });
}

loadActivities();
</script>
</body>
</html>
