<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Log — jprbuilds.com</title>
<meta name="description" content="Jason's running log — Strava activity history with pace splits, HR zones, Leaflet maps, and parkrun times." />
<meta property="og:title" content="Running Log — jprbuilds.com" />
<meta property="og:description" content="Live running log powered by the Strava API — pace splits, HR zones, route maps, and official parkrun times." />
<meta property="og:type" content="website" />

<style>
  .layout {
    display: grid;
    grid-template-columns: 264px 1fr 210px;
    min-height: calc(100vh - 130px);
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid rgba(255,255,255,0.07);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }

  .widget {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 1rem;
  }
  .widget-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.25);
    margin-bottom: 0.75rem;
  }

  /* Month stats */
  .month-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.25rem; text-align: center; }
  .ms-val { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #a78bfa; line-height: 1.1; display: block; }
  .ms-lbl { font-size: 10px; color: rgba(255,255,255,0.28); display: block; margin-top: 3px; }

  /* Streak calendar */
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 5px; }
  .cal-day-label { text-align: center; font-size: 9px; color: rgba(255,255,255,0.18); text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-dot {
    aspect-ratio: 1;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  .cal-dot.ran { background: #a78bfa; border-color: #a78bfa; box-shadow: 0 0 5px rgba(167,139,250,0.35); }
  .cal-dot.today { box-shadow: 0 0 0 1px rgba(255,255,255,0.3); }

  /* Weekly distance bars */
  .effort-bars { display: flex; flex-direction: column; gap: 5px; }
  .effort-row { display: flex; align-items: center; gap: 8px; }
  .effort-week-lbl { font-size: 9px; color: rgba(255,255,255,0.22); width: 38px; flex-shrink: 0; text-align: right; }
  .effort-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
  .effort-bar-fill { height: 100%; background: linear-gradient(90deg, #a78bfa, #c084fc); border-radius: 3px; }
  .effort-km-lbl { font-size: 9px; color: rgba(255,255,255,0.28); width: 28px; text-align: right; flex-shrink: 0; }

  .strava-badge { display: flex; align-items: center; gap: 6px; font-size: 0.8125rem; color: rgba(255,255,255,0.22); margin-top: auto; padding-top: 0.5rem; }
  .strava-badge span { width: 8px; height: 8px; border-radius: 50%; background: #fc4c02; display: inline-block; }

  /* ── Feed column ── */
  .feed-column { display: flex; flex-direction: column; overflow-y: auto; }
  .page-header { padding: 2rem 1.5rem 0.75rem; }

  .feed {
    padding: 0 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  /* ── Right rail ── */
  .right-rail {
    border-left: 1px solid rgba(255,255,255,0.07);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: none;
  }
  .right-rail::-webkit-scrollbar { display: none; }

  /* All-time totals */
  .at-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .at-item { display: flex; flex-direction: column; gap: 3px; }
  .at-val { font-family: 'DM Serif Display', serif; font-size: 1.25rem; color: #a78bfa; line-height: 1.1; }
  .at-lbl { font-size: 10px; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.06em; }

  /* Personal bests */
  .pb-item {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; flex-direction: column; gap: 3px;
  }
  .pb-item:last-child { border-bottom: none; }
  .pb-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(255,255,255,0.25); }
  .pb-val { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); }
  .pb-link { font-size: 10px; color: rgba(167,139,250,0.55); text-decoration: none; transition: color 0.15s; }
  .pb-link:hover { color: #a78bfa; }

  /* ── Activity cards ── */
  .activity-card {
    display: grid;
    grid-template-columns: 120px 1fr;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
  }
  .activity-card:hover {
    background: rgba(255,255,255,0.055);
    border-color: rgba(167,139,250,0.3);
    transform: translateY(-1px);
  }

  .card-thumb {
    background: rgba(0,0,0,0.25);
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    min-height: 90px;
  }
  .thumb-placeholder {
    font-size: 1.75rem;
    opacity: 0.18;
    user-select: none;
  }

  .card-body {
    padding: 0.875rem 1.125rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    justify-content: center;
  }
  .card-name { font-family: 'DM Serif Display', serif; font-size: 1.0625rem; color: rgba(255,255,255,0.9); line-height: 1.2; }
  .card-date { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 1px; }

  .card-stats { display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: flex-end; }
  .cs-item { display: flex; flex-direction: column; gap: 1px; }
  .cs-val { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.82); }
  .cs-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.27); }

  .card-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .hr-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 20px; }
  .hr-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
  .parkrun-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(79,195,247,0.12); color: #4fc3f7; border: 1px solid rgba(79,195,247,0.25); }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: rgba(255,255,255,0.3); font-size: 13px; gap: 8px; }
  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 1100px) {
    .layout { grid-template-columns: 264px 1fr; }
    .right-rail { display: none; }
  }
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); flex-direction: row; flex-wrap: wrap; overflow: visible; }
    .widget { flex: 1; min-width: 200px; }
  }
  @media (max-width: 560px) {
    .activity-card { grid-template-columns: 1fr; }
    .card-thumb { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); min-height: 70px; }
  }
</style>

<div class="layout">

    <div class="widget">

<script>
const PROXY = '/strava/proxy.php';

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function fPace(mps) {
  if (!mps) return '—';
  const spm = 1000 / mps, m = Math.floor(spm / 60), s = Math.round(spm % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}
function fTime(s) {
  const m = Math.floor(s / 60), sec = (s % 60).toString().padStart(2, '0');
  return m > 59 ? `${Math.floor(m / 60)}h ${(m % 60).toString().padStart(2, '0')}m` : `${m}:${sec}`;
}
function hrZone(avg) {
  if (!avg) return null;
  if (avg < 120) return { label: 'Easy',       color: '#4fc3f7' };
  if (avg < 140) return { label: 'Steady',     color: '#aed581' };
  if (avg < 155) return { label: 'Tempo',      color: '#ffeb3b' };
  if (avg < 168) return { label: 'Hard',       color: '#ff8c42' };
  return              { label: 'Max effort', color: '#e53935' };
}

function decodePoly(encoded) {
  const pts = [];
  let idx = 0, lat = 0, lng = 0;
  while (idx < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 32);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(idx++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 32);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    pts.push([lat / 1e5, lng / 1e5]);
  }
  return pts;
}

function routeSVG(encoded, w, h) {
  if (!encoded) return null;
  const pts = decodePoly(encoded);
  if (pts.length < 2) return null;
  const lats = pts.map(p => p[0]), lngs = pts.map(p => p[1]);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
  const pad = 7;
  const spanLat = maxLat - minLat || 0.001;
  const spanLng = maxLng - minLng || 0.001;
  const scale = Math.min((w - pad * 2) / spanLng, (h - pad * 2) / spanLat);
  const ox = pad + ((w - pad * 2) - spanLng * scale) / 2;
  const oy = pad + ((h - pad * 2) - spanLat * scale) / 2;
  const step = Math.max(1, Math.floor(pts.length / 250));
  const d = pts.filter((_, i) => i % step === 0).map((p, i) => {
    const x = (ox + (p[1] - minLng) * scale).toFixed(1);
    const y = (oy + (maxLat - p[0]) * scale).toFixed(1);
    return (i === 0 ? 'M' : 'L') + x + ',' + y;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" style="display:block"><path d="${d}" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/></svg>`;
}

function isoDate(d) {
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
}
function mondayOf(d) {
  const c = new Date(d);
  c.setHours(0, 0, 0, 0);
  const dow = (c.getDay() + 6) % 7;
  c.setDate(c.getDate() - dow);
  return c;
}

function buildCalendar(runs) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const mondayThis = mondayOf(today);
  const runDays = new Set(runs.map(a => isoDate(new Date(a.start_date_local))));

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  // w=0 = this week (top row), w=4 = 4 weeks ago (bottom row)
  for (let w = 0; w < 5; w++) {
    for (let d = 0; d < 7; d++) {
      const date = new Date(mondayThis); date.setDate(mondayThis.getDate() - w * 7 + d);
      const key = isoDate(date);
      const dot = document.createElement('div');
      dot.className = 'cal-dot' + (runDays.has(key) ? ' ran' : '') + (date.getTime() === today.getTime() ? ' today' : '');
      dot.title = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + (runDays.has(key) ? ' — ran' : '');
      grid.appendChild(dot);
    }
  }
}

function buildRightRail(runs) {
  // All-time totals
  const totalKm   = runs.reduce((s, a) => s + a.distance, 0) / 1000;
  const totalSecs = runs.reduce((s, a) => s + (a.moving_time || 0), 0);
  const totalElev = runs.reduce((s, a) => s + (a.total_elevation_gain || 0), 0);
  const totalHrs  = (totalSecs / 3600).toFixed(0);
  const elevStr   = totalElev >= 1000 ? (totalElev / 1000).toFixed(1) + 'k' : Math.round(totalElev) + '';

  document.getElementById('allTimeGrid').innerHTML = `
    <div class="at-item"><span class="at-val">${runs.length}</span><span class="at-lbl">Runs</span></div>
    <div class="at-item"><span class="at-val">${Math.round(totalKm).toLocaleString('en-GB')}</span><span class="at-lbl">km</span></div>
    <div class="at-item"><span class="at-val">${totalHrs}</span><span class="at-lbl">Hours</span></div>
    <div class="at-item"><span class="at-val">${elevStr}m</span><span class="at-lbl">Elevation</span></div>`;

  // Personal bests — find the activity for each record
  const withDist  = runs.filter(a => a.distance > 0);
  const withSpeed = runs.filter(a => a.average_speed > 0);
  const withElev  = runs.filter(a => (a.total_elevation_gain || 0) > 0);

  const longest  = withDist.length  ? withDist.reduce((b, a) => a.distance > b.distance ? a : b)                           : null;
  const fastest  = withSpeed.length ? withSpeed.reduce((b, a) => a.average_speed > b.average_speed ? a : b)                 : null;
  const hilliest = withElev.length  ? withElev.reduce((b, a) => a.total_elevation_gain > b.total_elevation_gain ? a : b)    : null;

  function pbDate(a) {
    return new Date(a.start_date_local).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  const bests = [
    longest  && { lbl: 'Longest run',    val: (longest.distance / 1000).toFixed(2) + ' km', a: longest  },
    fastest  && { lbl: 'Best avg pace',  val: fPace(fastest.average_speed) + ' /km',         a: fastest  },
    hilliest && { lbl: 'Most elevation', val: Math.round(hilliest.total_elevation_gain) + 'm', a: hilliest },
  ].filter(Boolean);

  document.getElementById('pbList').innerHTML = bests.map(({ lbl, val, a }) => `
    <div class="pb-item">
      <span class="pb-lbl">${lbl}</span>
      <span class="pb-val">${val}</span>
      <a class="pb-link" href="/strava/activity.html?id=${a.id}">${pbDate(a)} →</a>
    </div>`).join('');
}

function buildEffortBars(runs) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const weeks = [];
  for (let w = 0; w <= 7; w++) {
    const start = mondayOf(today); start.setDate(start.getDate() - w * 7);
    const end = new Date(start); end.setDate(start.getDate() + 7);
    const km = runs.filter(a => { const d = new Date(a.start_date_local); return d >= start && d < end; })
                   .reduce((s, a) => s + a.distance, 0) / 1000;
    weeks.push({ label: start.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), km });
  }
  const maxKm = Math.max(...weeks.map(w => w.km), 1);
  document.getElementById('effortBars').innerHTML = weeks.map(w => `
    <div class="effort-row">
      <div class="effort-week-lbl">${w.label}</div>
      <div class="effort-bar-track"><div class="effort-bar-fill" style="width:${Math.round(w.km / maxKm * 100)}%"></div></div>
      <div class="effort-km-lbl">${w.km > 0 ? w.km.toFixed(1) : ''}</div>
    </div>`).join('');
}

async function init() {
  try {
    const [res, prRes] = await Promise.all([
      fetch(`${PROXY}?action=activities`),
      fetch(`${PROXY}?action=parkrun_dates`)
    ]);

    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try {
        const err = await res.json();
        if (err?.error) msg = err.error;
      } catch (_) {}
      throw new Error(msg);
    }

    const runs = await res.json();
    const parkrunDatesJson = await prRes.json().catch(() => []);
    const parkrunDates = new Set(Array.isArray(parkrunDatesJson) ? parkrunDatesJson : []);
    if (!Array.isArray(runs) || !runs.length) {
      document.getElementById('feed').innerHTML = '<div class="loading">No runs yet.</div>';
      return;
    }

    // Month stats
    const now = new Date();
    const monthName = now.toLocaleDateString('en-GB', { month: 'long' });
    document.getElementById('monthLabel').textContent = monthName;
    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const monthRuns = runs.filter(a => new Date(a.start_date) >= monthStart);
    const monthKm   = monthRuns.reduce((s, a) => s + a.distance, 0) / 1000;
    const speeds    = runs.filter(a => a.average_speed);
    const avgSpd    = speeds.length ? speeds.reduce((s, a) => s + a.average_speed, 0) / speeds.length : 0;
    document.getElementById('msRuns').textContent = monthRuns.length;
    document.getElementById('msKm').textContent   = monthKm.toFixed(1);
    document.getElementById('msPace').textContent = fPace(avgSpd);

    buildCalendar(runs);
    buildEffortBars(runs);
    buildRightRail(runs);

    // Feed cards
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    runs.forEach(a => {
      const zone    = hrZone(a.average_heartrate);
      const svg     = routeSVG(a.map?.summary_polyline, 100, 72);
      const isRide  = a.type === 'Ride' || a.type === 'VirtualRide';
      const isRun   = a.type === 'Run'  || a.type === 'VirtualRun';
      const thumb   = svg
        ? `<div class="card-thumb">${svg}</div>`
        : `<div class="card-thumb"><div class="thumb-placeholder">${isRide ? '🚴' : '🏃'}</div></div>`;

      const dateObj  = new Date(a.start_date_local);
      const dateStr  = dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
      const timeStr  = dateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const elev     = a.total_elevation_gain ? `${Math.round(a.total_elevation_gain)}m` : null;
      const actDate  = `${dateObj.getFullYear()}-${(dateObj.getMonth()+1).toString().padStart(2,'0')}-${dateObj.getDate().toString().padStart(2,'0')}`;
      const hasParkrun = isRun && parkrunDates.has(actDate);

      const card = document.createElement('a');
      card.className = 'activity-card';
      card.href = `/strava/activity.html?id=${a.id}`;
      card.innerHTML = `
        ${thumb}
        <div class="card-body">
          <div>
            <div class="card-name">${escapeHtml(a.name)}</div>
            <div class="card-date">${dateStr} at ${timeStr}</div>
          </div>
          <div class="card-stats">
            <div class="cs-item"><span class="cs-val">${(a.distance / 1000).toFixed(2)} km</span><span class="cs-lbl">Distance</span></div>
            <div class="cs-item"><span class="cs-val">${fPace(a.average_speed)} /km</span><span class="cs-lbl">Pace</span></div>
            <div class="cs-item"><span class="cs-val">${fTime(a.moving_time)}</span><span class="cs-lbl">Time</span></div>
            ${elev ? `<div class="cs-item"><span class="cs-val">${elev}</span><span class="cs-lbl">Elev</span></div>` : ''}
          </div>
          <div class="card-pills">
            ${zone && a.average_heartrate ? `<div class="hr-pill" style="background:${zone.color}22;color:${zone.color}"><span class="dot" style="background:${zone.color}"></span>${Math.round(a.average_heartrate)} bpm · ${zone.label}</div>` : ''}
            ${hasParkrun ? `<div class="parkrun-pill">🏃 parkrun</div>` : ''}
          </div>
        </div>`;
      feed.appendChild(card);
    });
  } catch (e) {
    const msg = (e && e.message) ? e.message : 'Failed to load runs.';
    document.getElementById('feed').innerHTML = `<div class="loading">Failed to load runs: ${msg}</div>`;
  }
}

init();
</script>
</body>
</html>
